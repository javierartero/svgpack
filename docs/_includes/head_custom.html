<link rel="icon" type="image/png" href="{{ "/assets/favicons/favicon-96x96.png" | relative_url }}" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="{{ "/assets/favicons/favicon.svg" | relative_url }}" />
<link rel="shortcut icon" href="{{ "/assets/favicons/favicon.ico" | relative_url }}" />
<link rel="apple-touch-icon" sizes="180x180" href="{{ "/assets/favicons/apple-touch-icon.png" | relative_url }}" />
<meta name="apple-mobile-web-app-title" content="svgpack" />
<link rel="manifest" href="{{ "/assets/favicons/site.webmanifest" | relative_url }}" />
<link rel="alternate" type="text/markdown" href="{{ "/llms.txt" | absolute_url }}" title="LLMs" />
<link rel="alternate" type="text/plain" href="{{ "/llms-full.txt" | absolute_url }}" title="LLMs Full" />

{% assign seo_title = page.title | default: site.title %}
{% assign seo_description = page.description | default: site.description %}
{% assign seo_url = page.url | absolute_url %}
{% assign seo_image = page.image | default: site.image | absolute_url %}

<meta property="og:type" content="{% if page.url == '/' %}website{% else %}article{% endif %}" />
<meta property="og:url" content="{{ seo_url }}" />
<meta property="og:title" content="{{ seo_title | escape }}" />
<meta property="og:description" content="{{ seo_description | strip_html | strip_newlines | escape }}" />
<meta property="og:image" content="{{ seo_image }}" />
<meta property="twitter:card" content="summary_large_image" />
<meta property="twitter:url" content="{{ seo_url }}" />
<meta property="twitter:title" content="{{ seo_title | escape }}" />
<meta property="twitter:description" content="{{ seo_description | strip_html | strip_newlines | escape }}" />
<meta property="twitter:image" content="{{ seo_image }}" />

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "svgpack",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": "Cross-platform",
  "description": "{{ site.description | escape }}",
  "url": "{{ site.url }}",
  "image": "{{ '/svgpack-social.png' | absolute_url }}",
  "downloadUrl": "https://www.npmjs.com/package/@artero/svgpack",
  "softwareVersion": "2.2.1",
  "author": {
    "@type": "Person",
    "name": "{{ site.author | escape }}"
  },
  "codeRepository": "https://github.com/JavierArtero/svgpack"
}
</script>

<!-- Umami analytics -->
<script defer src="https://cloud.umami.is/script.js" data-website-id="330493e8-0bc0-47ed-8e2c-30050356311b"></script>
